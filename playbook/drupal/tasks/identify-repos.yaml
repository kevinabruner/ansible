- name: Identify target sites. If no repo provided, then use all of them.
  set_fact:
    app_list: >-
      {% if target_app is defined %}
        {{ [target_app] }}
      {% else %}
        {{ groups['role_drupal'] 
            | map('extract', hostvars, 'group_names') 
            | flatten 
            | select('match', '^repo_') 
            | map('replace', 'repo_', '') 
            | unique 
            | list }}
      {% endif %}

- name: Ensure app_list is is a lists
  set_fact:
    app_list: "{{ app_list | from_yaml }}"